<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
    body {
        font-family: 'Gill Sans MT';
        background: #fffce6;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    form {
        background-color: #fffdcf;
        padding: 25px;
        border-radius: 10px;
        width: auto;
        box-shadow: 0 4px 10px rgba(253, 253, 13, 0.15);
    }

    .form-control {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: 1px solid #cccc0f;
    }


    #result {
        margin-top: 15px;
        font-weight: bold;
        text-align: center;
        color: #c7ca0a;
    }
</style>
</head>
<body>
    <div class="container d-flex flex-column align-items-center mx-auto mt-5" style="padding-top: 70px; padding-bottom: 150px;">
        <div class="row">
            <div class="col-md-4 text-center mx-auto">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSOH2aZnIHWjMQj2lQUOWIL2f4Hljgab0ecZQ&s"
                class="img-fluid rounded-circle mb-3" alt="Profile Picture">
                <br>
                <h2> Login </h2>
            </div>

            <div class="col-md-8 mx-auto">
                <form class="p-5 border rounded" onsubmit="authenticate()" style="background-color: white; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); font-family:'Gill Sans'">
                    <div class="row">
                        <div class="col">
                            <label for="uname">Username:</label>
                            <input type="text" class="form-control" id="uname" placeholder="Enter Username" required>
                        </div>
                    </div>
                    <div class="mt-3">
                        <label for="pass"> Password </label>
                        <input type="text" class="form-control" id="pass" placeholder="Enter Password" required>
                    </div>
                    <center><button type="submit" value="Login" style="background-color: hwb(61 37% 1%); border-color: hwb(60 2% 51%); padding: 5px; border-radius: 5px; color: rgb(86, 90, 34); width: 200px;">Login</button></center>
                </form>
            </div>
        </div>
    </div>

    <script>
        function authenticate() {
            var username = document.getElementById('uname').value;
            var password = document.getElementById('pass').value;

            if (username===""||password===""){
                alert("Please input Username and Password");
                return;
            }
            
            if(username==='sampleuser67' && password==='12345678'){
                alert ("Welcome " + username);
            } else {
                alert ("Invalid username/password");
            }
        }
    </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
